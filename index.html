<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2025 Recap - 3 Frames</title>
<style>
  body { font-family: Arial; text-align: center; padding: 20px; background: #f7f7f7; }
  .frame { background: white; padding: 20px; margin: 10px auto; width: 80%; border-radius: 8px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.1);}
  .frame:hover { background: #eaeaea; }
  .content { display: none; margin-top: 20px; }
</style>
<script>
function showContent(id){
  document.querySelectorAll('.content').forEach(el => el.style.display='none');
  document.getElementById(id).style.display='block';
}
</script>
</head>
<body>

<h1>📅 My 2025 Highlights</h1>
<div class="frame" onclick="showContent('frame1')">Start of the Year</div>
<div class="frame" onclick="showContent('frame2')">Mid-Year</div>
<div class="frame" onclick="showContent('frame3')">End of the Year</div>

<div id="frame1" class="content">
  <h2>January</h2>
  <p>Started new projects and embraced courage.</p>
</div>

<div id="frame2" class="content">
  <h2>June</h2>
  <p>Achieved mid-year milestones and learned valuable lessons.</p>
</div>

<div id="frame3" class="content">
  <h2>December</h2>
  <p>Reflected on growth and prepared for 2026.</p>
</div>

</body>
</html>
